name: CI
on:
  push:
    branches:
      - main
    tags: ['*']
  pull_request:
  workflow_dispatch:
concurrency:
  # Skip intermediate builds: always.
  # Cancel intermediate builds: only if it is a pull request build.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}
jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    permissions: # needed to allow julia-actions/cache to proactively delete old caches that it has created
      actions: write
      contents: read
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1.12' 
        os:
          - ubuntu-latest
        arch:
          - x64
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v3
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
        with: 
          coverage: ${{ matrix.version == '1.12' && matrix.os == 'ubuntu-latest' && matrix.arch == 'x64' }}
      - uses: julia-actions/julia-processcoverage@v1
        if: matrix.version == '1.12' && matrix.os == 'ubuntu-latest' && matrix.arch == 'x64'
      - name: Warn if CODECOV_TOKEN is not set
        if: matrix.version == '1.12' && matrix.os == 'ubuntu-latest' && matrix.arch == 'x64' && env.CODECOV_TOKEN == ''
        run: echo "::warning::CODECOV_TOKEN secret is not set — skipping codecov upload. Add it in repo Settings → Secrets to enable coverage tracking."
      - uses: codecov/codecov-action@v5
        if: matrix.version == '1.12' && matrix.os == 'ubuntu-latest' && matrix.arch == 'x64' && env.CODECOV_TOKEN != ''
        with:
          fail_ci_if_error: false
          token: ${{ env.CODECOV_TOKEN }}
          files: lcov.info
